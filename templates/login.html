<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Autenticação | Next Move</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    
    <style>
        /* CSS extra para o botão de mostrar senha e esconder os painéis */
        .password-wrapper {
            position: relative;
            width: 100%;
        }
        
        .btn-exibir {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #00a8ff;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            text-transform: uppercase;
            outline: none;
            transition: 0.3s;
        }
        
        .btn-exibir:hover {
            color: var(--neon-green);
            text-shadow: 0 0 8px var(--neon-green);
        }

        .escondido {
            display: none;
        }
    </style>
</head>
<body>

    <nav class="cyber-nav">
        <a href="/" class="logo">NEXT<span>MOVE</span></a>
        <div class="nav-links">
            <a href="/">> Voltar para Home</a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-box">
            
            <!-- ==========================================
                 PAINEL DE LOGIN
                 ========================================== -->
            <div id="painel-login">
                <div class="auth-header">
                    <span class="system-status">// AUTH_SYSTEM - v2.0</span>
                    <h2>ACESSO</h2>
                </div>

                <form action="/login" method="POST">
                    <label class="tech-label">EMAIL_ID</label>
                    <input type="text" name="email" placeholder="usuario@nextmove.art" required>

                    <label class="tech-label">SENHA_HASH</label>
                    <div class="password-wrapper">
                        <input type="password" name="senha" id="senha-login" placeholder="........" required>
                        <button type="button" class="btn-exibir" onclick="mostrarSenha('senha-login', this)">Exibir</button>
                    </div>

                    <button type="submit" class="btn btn-green btn-auth">AUTENTICAR</button>
                </form>

                <div style="margin-top: 25px; text-align: center;">
                    <a href="#" onclick="trocarPainel('cadastro')" style="color: var(--text-muted); font-family: 'Space Mono', monospace; font-size: 0.85rem; text-decoration: none; transition: 0.3s;" onmouseover="this.style.color='#00ff41'" onmouseout="this.style.color='var(--text-muted)'">
                        > Novo por aqui? Solicitar credenciais (Cadastrar)
                    </a>
                </div>
            </div>

            <!-- ==========================================
                 PAINEL DE CADASTRO (Escondido por padrão)
                 ========================================== -->
            <div id="painel-cadastro" class="escondido">
                <div class="auth-header">
                    <span class="system-status">// REGISTRO_PROTOCOL - v1.0</span>
                    <h2>CADASTRO</h2>
                </div>

                <form action="/cadastro" method="POST">
                    <label class="tech-label">NOME_COMPLETO</label>
                    <input type="text" name="nome" placeholder="Digite seu nome..." required>

                    <label class="tech-label">EMAIL_ID</label>
                    <input type="text" name="email" placeholder="usuario@nextmove.art" required>

                    <label class="tech-label">CRIAR_SENHA</label>
                    <div class="password-wrapper">
                        <input type="password" name="senha" id="senha-cadastro" placeholder="........" required>
                        <button type="button" class="btn-exibir" onclick="mostrarSenha('senha-cadastro', this)">Exibir</button>
                    </div>

                    <button type="submit" class="btn btn-green btn-auth" style="border-color: #00a8ff; color: #00a8ff; box-shadow: 0 0 10px rgba(0, 168, 255, 0.2), inset 0 0 5px rgba(0, 168, 255, 0.2);">CRIAR CONTA</button>
                </form>

                <div style="margin-top: 25px; text-align: center;">
                    <a href="#" onclick="trocarPainel('login')" style="color: var(--text-muted); font-family: 'Space Mono', monospace; font-size: 0.85rem; text-decoration: none; transition: 0.3s;" onmouseover="this.style.color='#00a8ff'" onmouseout="this.style.color='var(--text-muted)'">
                        > Já tem credenciais? Retornar ao Login
                    </a>
                </div>
            </div>

        </div>
    </div>

    <!-- SCRIPTS PARA MÁGICA ACONTECER -->
    <script>
        // Função para mostrar/ocultar a senha
        function mostrarSenha(inputId, btn) {
            let input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                btn.innerText = "Ocultar";
            } else {
                input.type = "password";
                btn.innerText = "Exibir";
            }
        }

        // Função para alternar entre os painéis de Login e Cadastro
        function trocarPainel(destino) {
            let painelLogin = document.getElementById('painel-login');
            let painelCadastro = document.getElementById('painel-cadastro');

            if (destino === 'cadastro') {
                painelLogin.classList.add('escondido');
                painelCadastro.classList.remove('escondido');
            } else {
                painelCadastro.classList.add('escondido');
                painelLogin.classList.remove('escondido');
            }
        }
    </script>
</body>
</html>
