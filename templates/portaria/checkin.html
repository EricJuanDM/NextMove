<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo }} | Next Move</title>
    <style>
        body { background-color: #050505; color: #fff; font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        h1 { color: #00ff41; text-transform: uppercase; text-align: center; }
        
        /* Estilo da Barra de Busca */
        .busca-container { margin-bottom: 25px; }
        #inputBusca { width: 100%; box-sizing: border-box; padding: 15px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; font-size: 1.1rem; }
        #inputBusca:focus { outline: none; border-color: #00ff41; box-shadow: 0 0 10px rgba(0,255,65,0.2); }
        
        .card-pessoa { background: #111; border: 1px solid #333; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .info-pessoa h3 { margin: 0; font-size: 1.1rem; }
        .info-pessoa p { margin: 5px 0 0 0; font-size: 0.85rem; color: #888; }
        
        .btn-checkin { background: #222; color: #fff; border: 1px solid #444; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-checkin:hover { background: #333; }
        .btn-checkin.feito { background: rgba(0, 255, 65, 0.2); color: #00ff41; border-color: #00ff41; pointer-events: none; }
        
        .btn-voltar { display: block; text-align: center; color: #888; text-decoration: none; margin-top: 30px; padding-bottom: 20px; }
    </style>
</head>
<body>

    <h1>📋 {{ titulo }}</h1>
    <p style="text-align: center; color: #888; margin-bottom: 20px;">Total na lista: {{ participantes|length }}</p>

    <div class="busca-container">
        <input type="text" id="inputBusca" onkeyup="filtrarNomes()" placeholder="🔍 Digite o nome do participante...">
    </div>
    <div id="listaParticipantes">
        {% for p in participantes %}
        <div class="card-pessoa">
            <div class="info-pessoa">
                <h3>{{ p[1] if p[1] else 'Sem Nome (Conta Antiga)' }}</h3>
                <p>Tipo: {{ p[2]|replace('_', ' ')|title }}</p>
            </div>
            
            {% if p[3] == True %}
                <button class="btn-checkin feito">✅ Realizado</button>
            {% else %}
                <button id="btn-{{ p[0] }}" class="btn-checkin" onclick="fazerCheckin({{ p[0] }})">Dar Check-in</button>
            {% endif %}
        </div>
        {% endfor %}
    </div>

    <a href="{{ url_for('portaria.painel_portaria') }}" class="btn-voltar">← Voltar para a Portaria</a>

    <script>
        // --- 1. FUNÇÃO DA BARRA DE BUSCA RÁPIDA ---
        function filtrarNomes() {
            // Pega o que foi digitado e transforma em letras minúsculas (para não dar erro com Maiúsculas)
            let input = document.getElementById('inputBusca');
            let filtro = input.value.toLowerCase();
            
            // Pega todos os cards da tela
            let lista = document.getElementById('listaParticipantes');
            let cards = lista.getElementsByClassName('card-pessoa');

            // Passa por todos os cards lendo o nome de cada um
            for (let i = 0; i < cards.length; i++) {
                let h3 = cards[i].getElementsByTagName("h3")[0];
                let nome = h3.textContent || h3.innerText;

                // Se o nome tiver as letras digitadas, mostra. Se não tiver, esconde o card!
                if (nome.toLowerCase().indexOf(filtro) > -1) {
                    cards[i].style.display = "flex";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }

        // --- 2. FUNÇÃO DE DAR CHECK-IN NO BANCO DE DADOS ---
        function fazerCheckin(ingressoId) {
            const btn = document.getElementById(`btn-${ingressoId}`);
            btn.innerText = "Processando...";

            fetch(`/api/confirmar_checkin/${ingressoId}`, { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'sucesso') {
                    btn.classList.add('feito');
                    btn.innerText = "✅ Realizado";
                } else {
                    alert("Erro: " + data.mensagem);
                    btn.innerText = "Dar Check-in";
                }
            })
            .catch(error => alert("Erro de conexão."));
        }
    </script>
</body>
</html>
