<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking do Bolão | Next Move</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .ranking-container { max-width: 600px; margin: 50px auto; background: var(--bg-panel); border: 1px solid var(--border-dark); border-top: 3px solid var(--neon-gold); padding: 30px; box-shadow: 0 0 20px var(--neon-gold-dim); }
        .ranking-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #222; font-family: 'Space Mono', monospace; }
        .ranking-row:nth-child(1) { color: var(--neon-gold); font-size: 1.2rem; font-weight: bold; text-shadow: 0 0 10px var(--neon-gold-dim); border-left: 3px solid var(--neon-gold); background: rgba(252, 238, 10, 0.05); }
        .ranking-row:nth-child(2) { color: #c0c0c0; border-left: 3px solid #c0c0c0; }
        .ranking-row:nth-child(3) { color: #cd7f32; border-left: 3px solid #cd7f32; }
    </style>
</head>
<body>

    <nav class="cyber-nav">
        <a href="/" class="logo">NEXT<span>MOVE</span></a>
        <div class="nav-links">
            <a href="/votacao" class="btn btn-green">VOLTAR AO BOLÃO</a>
        </div>
    </nav>

    <div class="ranking-container">
        <h2 style="color: var(--neon-gold); text-align: center; margin-bottom: 30px;">🏆 TOP SCORE_</h2>
        
        <div style="margin-bottom: 20px;">
            <div class="ranking-row" style="border: none; color: var(--text-muted); font-size: 0.8rem;">
                <span>// USUÁRIO</span>
                <span>ACERTOS</span>
            </div>
            {% for usuario, acertos in ranking %}
                <div class="ranking-row">
                    <span>{{ loop.index }}. {{ usuario }}</span>
                    <span>{{ acertos }} PTS</span>
                </div>
            {% else %}
                <p class="tech-label" style="text-align: center; margin-top: 20px;">// NENHUM DADO ENCONTRADO NO SISTEMA</p>
            {% endfor %}
        </div>
    </div>

</body>
</html>
