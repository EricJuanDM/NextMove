<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completar Perfil | Next Move</title>
    <style>
        body { background-color: #050505; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #111; padding: 40px; border-radius: 10px; text-align: center; max-width: 400px; width: 90%; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,255,65,0.1); }
        h2 { margin-top: 0; color: #00ff41; text-transform: uppercase; }
        p { color: #aaa; font-size: 0.95rem; margin-bottom: 25px; }
        input[type="text"] { width: 90%; padding: 15px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; font-size: 1rem; }
        input[type="text"]:focus { outline: none; border-color: #00ff41; }
        button { background-color: #00ff41; color: #000; border: none; padding: 15px; font-size: 1.1rem; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.3s; }
        button:hover { background-color: #00cc33; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="container">
        <h2>Falta Pouco!</h2>
        <p>Para garantir o seu acesso ao evento e o seu check-in nas aulas, precisamos do seu nome completo.</p>
        
        <form action="/completar_perfil" method="POST">
            <input type="text" name="nome_completo" placeholder="Digite seu Nome Completo" required autocomplete="name">
            <button type="submit">Salvar e Entrar</button>
        </form>
    </div>

</body>
</html>
