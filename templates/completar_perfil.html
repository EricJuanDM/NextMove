<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração de Perfil | Next Move</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>

    <nav class="cyber-nav">
        <a href="/" class="logo">NEXT<span>MOVE</span></a>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-box" style="border-top-color: var(--neon-green);">
            
            <div class="auth-header">
                <span class="system-status">// SETUP_PERFIL - v1.0</span>
                <h2>IDENTIFICAÇÃO</h2>
            </div>

            <form action="/completar_perfil" method="POST">
                <label class="tech-label">NOME_COMPLETO</label>
                <input type="text" name="nome_completo" placeholder="Digite seu nome real..." required>
                
                <button type="submit" class="btn btn-green btn-auth">SALVAR NO SISTEMA</button>
            </form>

        </div>
    </div>

</body>
</html>
